<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Nation's Eyes - Nigerian News & Editorial Analysis</title>
    <meta name="description" content="The Nation's Eyes delivers in-depth Nigerian news, political analysis, and editorial commentary. Unveiling truths, shaping perspectives." />
    <link rel="icon" type="image/png" href="https://i.ibb.co/Hf1MGpgb/icon-8.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        h1, h2, h3, .brand-font { font-family: 'Poppins', sans-serif; }
        
        /* Remove default link underlines */
        a { text-decoration: none !important; }

        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Continuous Ticker Animation */
        @keyframes ticker-scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }
        .animate-ticker-wrapper {
            display: flex;
            width: max-content;
            animation: ticker-scroll 40s linear infinite;
        }
        .animate-ticker-wrapper:hover { animation-play-state: paused; }
    </style>

</head>
<body class="bg-[#f8fafc] text-slate-900">
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
